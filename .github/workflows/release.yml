name: Create Release

on:
  push:
    branches: ['main']
    paths: ['package.json']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. V.0.1.0)'
        required: true
        default: 'V.0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=V.$VERSION" >> $GITHUB_OUTPUT

      - name: Resolve release version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.pkg.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Check if release already exists
        id: check
        run: |
          EXISTS=$(gh release view "${{ steps.ver.outputs.tag }}" --repo ${{ github.repository }} 2>/dev/null && echo "true" || echo "false")
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Zip dist
        if: steps.check.outputs.exists == 'false'
        run: zip -r booky-${{ steps.ver.outputs.tag }}.zip dist/

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Booky ${{ steps.ver.outputs.tag }}
          body: |
            ## Booky ${{ steps.ver.outputs.tag }}

            First stable release of Booky – your personal eBook library manager.

            ### What's New
            - 📚 Multi-format support: PDF, EPUB, MOBI, FB2, CBZ, AZW3, DJVU
            - 🎨 Multiple themes: Light, Dark, Sepia, Nord, Dracula
            - 📂 Collections and library organisation
            - 🛠️ PDF power tools (compress, rotate, extract, watermark, OCR)
            - 🌐 Live demo at https://programming2055.github.io/Booky/

            ### Installation
            ```bash
            git clone https://github.com/Programming2055/Booky.git
            cd Booky
            npm install
            npm start
            ```
          files: booky-${{ steps.ver.outputs.tag }}.zip
          draft: false
          prerelease: false
